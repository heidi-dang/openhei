name: test

on:
  push:
    branches:
      - dev
  pull_request:
  workflow_dispatch:
jobs:
  unit:
    name: unit (linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      # Do not override git identity in CI. The repository should not set
      # a project-branded identity. If a job requires an identity for
      # commits, use the GitHub Actions noreply bot identity instead.

      - name: Run unit tests
        env:
          GIT_TRACE: 1
          GIT_CURL_VERBOSE: 1
        run: bun turbo test

  e2e:
    name: e2e (${{ matrix.settings.name }})
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux
            host: ubuntu-latest
            playwright: bunx playwright install --with-deps
          - name: windows
            host: windows-latest
            playwright: bunx playwright install
    runs-on: ${{ matrix.settings.host }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install Playwright browsers
        working-directory: packages/app
        run: ${{ matrix.settings.playwright }}

      - name: Run app e2e tests
        run: bun --cwd packages/app test:e2e:local
        env:
          CI: true
        timeout-minutes: 30

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.settings.name }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            packages/app/e2e/test-results
            packages/app/e2e/playwright-report

  lint-installer:
    name: lint installer docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for legacy install URLs
        run: |
          if grep -r "openhei.ai/install" README*.md docs/; then
            echo "Error: Legacy installation URL found in documentation."
            exit 1
          fi

  required:
    name: test (linux)
    runs-on: ubuntu-latest
    needs:
      - unit
      - e2e
      - lint-installer
    if: always()
    steps:
      - name: Verify upstream test jobs passed
        run: |
          echo "unit=${{ needs.unit.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          echo "lint-installer=${{ needs.lint-installer.result }}"
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.e2e.result }}" = "success"
          test "${{ needs.lint-installer.result }}" = "success"
