id = "openhei"
name = "OpenHei"
description = "The open source coding agent."
version = "1.2.10"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/heidi-dang/openhei"

[agent_servers.openhei]
name = "OpenHei"
icon = "./icons/openhei.svg"

[agent_servers.openhei.targets.darwin-aarch64]
archive = "https://github.com/heidi-dang/openhei/releases/download/v1.2.10/openhei-darwin-arm64.zip"
cmd = "./openhei"
args = ["acp"]

[agent_servers.openhei.targets.darwin-x86_64]
archive = "https://github.com/heidi-dang/openhei/releases/download/v1.2.10/openhei-darwin-x64.zip"
cmd = "./openhei"
args = ["acp"]

[agent_servers.openhei.targets.linux-aarch64]
archive = "https://github.com/heidi-dang/openhei/releases/download/v1.2.10/openhei-linux-arm64.tar.gz"
cmd = "./openhei"
args = ["acp"]

[agent_servers.openhei.targets.linux-x86_64]
archive = "https://github.com/heidi-dang/openhei/releases/download/v1.2.10/openhei-linux-x64.tar.gz"
cmd = "./openhei"
args = ["acp"]

[agent_servers.openhei.targets.windows-x86_64]
archive = "https://github.com/heidi-dang/openhei/releases/download/v1.2.10/openhei-windows-x64.zip"
cmd = "./openhei.exe"
args = ["acp"]
